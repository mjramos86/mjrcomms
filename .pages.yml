media:
  input: images/portfolio
  output: /images/portfolio

content:
  - name: categories
    label: Catégories
    path: categories.json
    type: file
    fields:
      - name: items
        label: Catégories
        type: object
        list: true
        fields:
          - name: id
            label: "ID (slug)"
            type: string
            required: true
          - name: label
            label: Nom affiché
            type: string
            required: true

  - name: portfolio
    label: Portfolio
    path: portfolio.json
    type: file
    fields:
      - name: items
        label: Projets
        type: object
        list: true
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: client
            label: Client / Studio
            type: string
          - name: role
            label: Rôle
            type: string
            required: true
          - name: category
            label: Catégorie
            type: string
            hint: "Utiliser l'ID d'une catégorie (ex : jeux-video, cinema-tv, bande-dessinee)"
          - name: medium
            label: Médium
            type: string
          - name: year
            label: Année
            type: number
          - name: cover
            label: Image de couverture
            type: image
          - name: description
            label: Description
            type: rich-text
          - name: video
            label: "Vidéo (URL embed)"
            type: string
          - name: gallery
            label: Galerie d'images
            type: image
            list: true
          - name: link
            label: Lien externe
            type: string
          - name: id
            label: "ID (slug)"
            type: string
