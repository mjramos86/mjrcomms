media:
  input: images/portfolio
  output: images/portfolio

content:
  - name: categories
    label: Catégories
    path: categories.json
    type: file
    fields:
      - name: items
        label: Catégories
        type: object
        list:
          label: "{{fields.label}}"
        fields:
          - name: id
            label: "ID (slug)"
            type: string
            required: true
          - name: label
            label: Nom affiché
            type: string
            required: true

  - name: portfolio
    label: Portfolio
    path: portfolio.json
    type: file
    fields:
      - name: items
        label: Projets
        type: object
        list:
          label: "{{fields.title}}"
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: client
            label: Client / Studio
            type: string
          - name: role
            label: Rôle
            type: string
            required: true
          - name: category
            label: Catégorie
            type: string
            hint: "Utiliser l'ID d'une catégorie (ex : jeux-video, cinema-tv, bande-dessinee)"
          - name: medium
            label: Médium
            type: string
          - name: year
            label: Année
            type: number
          - name: cover
            label: Image de couverture
            type: image
          - name: cover_alt
            label: "Texte alternatif (alt) de la couverture"
            type: string
            hint: "Décrit l'image pour les moteurs de recherche et les lecteurs d'écran (ex : « Affiche officielle du jeu Projet-M »)"
          - name: seo_description
            label: "Description SEO (meta description)"
            type: string
            hint: "Résumé court (max 160 caractères) affiché dans les résultats Google et les aperçus de liens."
          - name: description
            label: Description
            type: rich-text
          - name: video
            label: "Vidéo (URL YouTube ou Vimeo)"
            type: string
            hint: "Coller l'URL normale — ex : https://www.youtube.com/watch?v=xxx"
          - name: accolades
            label: Accolades
            type: object
            list:
              label: "{{fields.title}}"
            fields:
              - name: title
                label: Titre de l'accolade
                type: string
                required: true
              - name: event
                label: "Événement / Festival"
                type: string
              - name: year
                label: Année
                type: number
          - name: gallery
            label: Galerie d'images
            type: object
            list:
              label: "{{fields.alt}}"
            fields:
              - name: src
                label: Image
                type: image
              - name: alt
                label: Texte alternatif (alt)
                type: string
                hint: "Décrit l'image (ex : « Capture d'écran du niveau 3 »)"
          - name: link
            label: Lien externe
            type: string
            hint: "URL officielle du projet (site du jeu, IMDb, etc.)"
          - name: id
            label: "ID (slug)"
            type: string
            hint: "Identifiant unique sans espaces (ex: projet-m)"

  - name: presse
    label: Dans la presse
    path: presse.json
    type: file
    fields:
      - name: items
        label: Articles de presse
        type: object
        list:
          label: "{{fields.title}} — {{fields.publication}}"
        fields:
          - name: title
            label: Titre de l'article
            type: string
            required: true
          - name: publication
            label: Nom du média
            type: string
            required: true
            hint: "Ex : Le Devoir, Radio-Canada, IGN France"
          - name: author
            label: Auteur / Journaliste
            type: string
          - name: date
            label: Date de parution
            type: date
            hint: "Format AAAA-MM-JJ"
          - name: cover
            label: Image de couverture
            type: image
            hint: "Ratio recommandé 16:9 (ex : 1280×720 px)"
          - name: cover_alt
            label: "Texte alternatif (alt) de la couverture"
            type: string
            hint: "Décrit l'image pour les moteurs de recherche et les lecteurs d'écran"
          - name: seo_description
            label: "Description SEO (meta description)"
            type: string
            hint: "Résumé court (max 160 caractères) affiché dans les résultats Google"
          - name: description
            label: Extrait / Résumé
            type: rich-text
            hint: "Résumé de l'article ou extrait notable"
          - name: link
            label: Lien vers l'article original
            type: string
            hint: "URL complète de l'article en ligne"
          - name: id
            label: "ID (slug)"
            type: string
            hint: "Identifiant unique sans espaces (ex: le-devoir-2025-03)"
