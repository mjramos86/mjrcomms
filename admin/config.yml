backend:
  name: github
  repo: mjramos86/mjrcomms
  branch: main

media_folder: "images/portfolio"
public_folder: "/images/portfolio"

locale: "fr"

collections:
  - name: "portfolio"
    label: "Portfolio"
    files:
      - name: "portfolio"
        label: "Projets du portfolio"
        file: "portfolio.json"
        fields:
          - label: "Projets"
            name: "items"
            widget: "list"
            label_singular: "Projet"
            summary: "{{fields.title}} — {{fields.client}} ({{fields.year}})"
            fields:
              - { label: "Titre",  name: "title",  widget: "string", required: true }
              - { label: "Client / Studio", name: "client", widget: "string",
                  required: false, hint: "Ex : Rogue Factor, Ztélé, Glénat" }
              - { label: "Rôle",   name: "role",   widget: "string", required: true,
                  hint: "Ex : Responsable des communications" }
              - label: "Catégorie"
                name: "category"
                widget: "select"
                required: true
                options:
                  - { label: "Jeux vidéo",     value: "jeux-video" }
                  - { label: "Cinéma / TV",     value: "cinema-tv" }
                  - { label: "Bande dessinée",  value: "bande-dessinee" }
              - { label: "Médium", name: "medium", widget: "string", required: false,
                  hint: "Ex : Jeu vidéo AA, PlayStation 5 / PC" }
              - { label: "Année",  name: "year",   widget: "number", value_type: "int",
                  min: 2000, max: 2099 }
              - { label: "Image de couverture", name: "cover", widget: "image",
                  required: false, hint: "Ratio recommandé 3:2 (ex : 900×600 px)" }
              - { label: "Description", name: "description", widget: "markdown",
                  required: false }
              - { label: "Vidéo (URL embed)", name: "video", widget: "string",
                  required: false, hint: "URL YouTube ou Vimeo (ex : https://www.youtube.com/embed/xxx)" }
              - label: "Galerie d'images"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - { label: "Lien externe", name: "link", widget: "string",
                  required: false, hint: "URL officielle du projet (site du jeu, IMDb, etc.)" }
              - { label: "ID (slug)", name: "id", widget: "string",
                  hint: "Identifiant unique sans espaces (ex: hell-is-us)" }

  - name: "presse"
    label: "Dans la presse"
    files:
      - name: "presse"
        label: "Articles de presse"
        file: "presse.json"
        fields:
          - label: "Articles"
            name: "items"
            widget: "list"
            label_singular: "Article"
            summary: "{{fields.title}} — {{fields.publication}}"
            fields:
              - { label: "Titre de l'article", name: "title", widget: "string", required: true }
              - { label: "Nom du média", name: "publication", widget: "string", required: true,
                  hint: "Ex : Le Devoir, Radio-Canada, IGN France" }
              - { label: "Auteur / Journaliste", name: "author", widget: "string", required: false }
              - { label: "Date de parution", name: "date", widget: "datetime", required: false,
                  format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Image de couverture", name: "cover", widget: "image",
                  required: false, hint: "Ratio recommandé 16:9 (ex : 1280×720 px)" }
              - { label: "Texte alternatif (alt) de la couverture", name: "cover_alt",
                  widget: "string", required: false }
              - { label: "Description SEO (meta description)", name: "seo_description",
                  widget: "string", required: false,
                  hint: "Résumé court (max 160 caractères) affiché dans les résultats Google" }
              - { label: "Extrait / Résumé", name: "description", widget: "markdown",
                  required: false, hint: "Résumé de l'article ou extrait notable" }
              - { label: "Lien vers l'article original", name: "link", widget: "string",
                  required: false, hint: "URL complète de l'article en ligne" }
              - { label: "ID (slug)", name: "id", widget: "string",
                  hint: "Identifiant unique sans espaces (ex: le-devoir-2025-03)" }
